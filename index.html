<!DOCTYPE html>
<html>

<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body>
  <header class="header">
    <img class="header__img" src="./eisenhower-matrix.jpg" alt="Eisenhower Priority Matrix">
    <a class="header__more" href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </header>

  <main class="main">
    <section class="add-section">
      <h3>
        <label class="heading" for="new-task">Add Item</label>
      </h3>
      <div class="add-section__task-wrapper">
        <input id="new-task" class="task" type="text">
        <button class="btn">Add</button>
      </div>
    </section>

    <section class="todo-section">
      <h3 class="heading">Todo</h3>

      <ul class="items" id="incomplete-tasks">
        <li class="item">
          <input class="item__mark" type="checkbox">
          <label class="item__task task">Pay Bills</label>
          <input class="item__task task" type="text">
          <button class="btn btn_edit">Edit</button>
          <button class="btn btn_delete">
            <img src="./remove.svg" alt="">
          </button>
        </li>

        <li class="item edit-mode">
          <input class="item__mark" type="checkbox">
          <label class="item__task task">Go Shopping</label>
          <input class="item__task task" type="text" value="Go Shopping">
          <button class="btn btn_edit">Save</button>
          <button class="btn btn_delete">
            <img src="./remove.svg" alt="">
          </button>
        </li>
      </ul>
    </section>

    <section class="complete-section">
      <h3 class="heading">Completed</h3>

      <ul id="completed-tasks" class="items">
        <li class="item">
          <input class="item__mark" type="checkbox" checked>
          <label class="item__task task">See the Doctor</label>
          <input type="text" class="item__task task">
          <button class="btn btn_edit">Edit</button>
          <button class="btn btn_delete">
            <img src="./remove.svg" alt="">
          </button>
        </li>
      </ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
